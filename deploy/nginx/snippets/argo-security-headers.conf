# Cabeceras de seguridad (incluir dentro del bloque server {})
# camera=(self): QR / PDF417 / captura de cédula en el ERP
# geolocation=(self): mapa de jornadas (GPS)
# microphone=(): sigue bloqueado
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
