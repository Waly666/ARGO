# Portal aula virtual — SPA en :8085; API/uploads directo al backend :5002
# (evita 502 si el nginx interno del contenedor no alcanza argo-backend en Docker)
# Instalar: deploy/setup-nginx-ssl.sh (Certbot añade listen 443 ssl)

server {
    listen 80;
    listen [::]:80;
    server_name finstruvial.edu.co www.finstruvial.edu.co;

    client_max_body_size 250m;
    include /opt/argo/deploy/nginx/snippets/argo-security-headers.conf;

    location /api/ {
        client_max_body_size 250m;
        proxy_pass http://127.0.0.1:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        include /opt/argo/deploy/nginx/snippets/argo-websocket-proxy.conf;
        proxy_pass http://127.0.0.1:5002/socket.io/;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:5002/api/aula-virtual/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
