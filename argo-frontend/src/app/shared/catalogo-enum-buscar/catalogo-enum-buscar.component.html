<div class="enum-buscar-host" [class.disabled]="disabled">
  <label *ngIf="label">{{ label }}</label>
  <div class="input-wrap" [class.combo]="modoCombo">
    <input
      type="text"
      [placeholder]="placeholder"
      [ngModel]="query()"
      (ngModelChange)="onInput($event)"
      (focus)="focus()"
      [disabled]="disabled"
      autocomplete="off"
    />
    <button
      *ngIf="modoCombo"
      type="button"
      class="combo-toggle"
      tabindex="-1"
      [disabled]="disabled"
      [attr.aria-expanded]="open()"
      (mousedown)="$event.preventDefault()"
      (click)="toggleOpen()">
      ▾
    </button>
    <span class="hint" *ngIf="loading()">Buscando…</span>
  </div>

  <ul class="dropdown" *ngIf="open() && resultados().length > 0">
    <li *ngFor="let o of resultados()" (mousedown)="pick(o)">
      <strong>{{ o.label }}</strong>
      <span *ngIf="o.hint">{{ o.hint }}</span>
    </li>
  </ul>

  <div
    class="dropdown empty"
    *ngIf="open() && !loading() && resultados().length === 0 && (modoCombo || query().trim().length >= minLength)"
  >
    {{ query().trim() ? 'No hay coincidencias.' : 'No hay opciones disponibles.' }}
  </div>

  <div
    class="dropdown empty"
    *ngIf="open() && !modoCombo && query().trim().length > 0 && query().trim().length < minLength"
  >
    Escriba al menos {{ minLength }} caracteres…
  </div>
</div>
