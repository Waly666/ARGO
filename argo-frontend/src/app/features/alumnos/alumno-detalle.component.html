<section class="detalle-page">
  <header class="page-head card">
    <div class="head-left">
      <button type="button" class="ghost back" (click)="volver()">← Lista</button>
      <div class="title-block">
        <h1>{{ tituloPagina() }}</h1>
        <p *ngIf="!esNuevo() && alumno() as a">{{ a.tipoDoc || 'CC' }} {{ a.numDoc }}</p>
        <p *ngIf="esNuevo()">Complete los datos principales y guarde para habilitar matrículas y pagos.</p>
      </div>
    </div>

    <div class="current" *ngIf="!esNuevo() && alumno() as a">
      <div class="avatar">
        <img *ngIf="fotoUrl() as f" [src]="f" alt="" />
        <span *ngIf="!fotoUrl()">{{ ((a.nombre1 || '?').charAt(0)) + ((a.apellido1 || '').charAt(0)) }}</span>
      </div>
      <div class="meta">
        <strong>{{ nombreCompleto() }}</strong>
        <span>CC {{ a.numDoc }}</span>
      </div>
    </div>
  </header>

  <div class="loading card" *ngIf="loading()">Cargando alumno…</div>

  <div class="card err" *ngIf="errorMsg() && !loading()">
    {{ errorMsg() }}
    <button type="button" class="ghost" (click)="volver()">Volver a lista</button>
  </div>

  <ng-container *ngIf="!loading() && !errorMsg()">
    <nav class="tabs">
      <button
        *ngFor="let t of tabs"
        type="button"
        class="tab"
        [class.active]="tab() === t.key"
        [class.disabled]="esNuevo() && t.key !== 'datos'"
        [disabled]="esNuevo() && t.key !== 'datos'"
        (click)="setTab(t.key)"
        [title]="esNuevo() && t.key !== 'datos' ? 'Guarde el alumno primero' : ''">
        {{ t.label }}
      </button>
    </nav>

    <div class="tab-body">
      <argo-datos-principales       *ngIf="tab() === 'datos'"></argo-datos-principales>
      <argo-servicios                *ngIf="tab() === 'servicios'"></argo-servicios>
      <argo-pagos                    *ngIf="tab() === 'pagos'"></argo-pagos>
      <argo-certificados             *ngIf="tab() === 'certificados'"></argo-certificados>
      <argo-tab-placeholder          *ngIf="tab() === 'documentos'" [titulo]="'Documentos'"></argo-tab-placeholder>
    </div>
  </ng-container>
</section>
