@if (visible()) {
  <div class="head-empleado-docs-row">
    <button
      type="button"
      class="head-alarm alarm-empleado-docs"
      (click)="irEmpleados($event)"
      [title]="detalle() || 'Hay documentos de empleados vencidos o por vencer'">
      <span class="head-alarm-pulse" aria-hidden="true"></span>
      <span class="head-alarm-icon" aria-hidden="true">◐</span>
      <span class="head-alarm-body">
        <span class="head-alarm-title"><strong>Papeles empleados</strong> · {{ titulo() }}</span>
        <span class="head-alarm-detail">{{ detalle() }}</span>
      </span>
      <span
        class="head-alarm-close"
        role="button"
        tabindex="0"
        (click)="cerrar($event)"
        (keydown.enter)="cerrar($event)"
        aria-label="Cerrar aviso">×</span>
    </button>
  </div>
}
