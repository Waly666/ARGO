<argo-head-alarm-list-banner
  [visible]="visible()"
  theme="hal-theme-chat"
  icon="💬"
  [title]="'Mensajes nuevos (' + rows().length + ')'"
  hint="Pulse una fila para abrir el chat."
  [items]="rows()"
  [itemDismissible]="true"
  (closed)="cerrar()"
  (itemClick)="onItemClick($event)"
  (itemDismiss)="onItemDismiss($event)"
/>
