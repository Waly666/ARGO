<argo-head-alarm-list-banner
  [visible]="visible()"
  theme="hal-theme-meta-jornada"
  icon="📣"
  [title]="'Meta de alumnos de jornada (' + rows().length + ')'"
  hint="La jornada llegó o superó el tope de alumnos proyectados (meta del contrato)."
  [items]="rows()"
  [itemDismissible]="true"
  (closed)="cerrar()"
  (itemDismiss)="onItemDismiss($event)"
/>
