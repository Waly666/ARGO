@if (alertas().length > 0) {
  <div class="foro-alerts" aria-label="Nuevos mensajes en foro de cursos">
    @for (a of alertas(); track a.id) {
      <div class="foro-alert-root">
        <button
          type="button"
          class="foro-alert-close"
          (click)="cerrar($event, a.id)"
          aria-label="Cerrar aviso">
          Cerrar <span aria-hidden="true">×</span>
        </button>
        <button
          type="button"
          class="foro-alert"
          (click)="abrir(a)"
          [attr.title]="'Ver conversación en ' + a.nombrePrograma">
          <span class="foro-alert-pulse" aria-hidden="true"></span>
          <span class="foro-alert-icon" aria-hidden="true">💬</span>
          <span class="foro-alert-body">
            <span class="foro-alert-course">{{ a.nombrePrograma }}</span>
            <span class="foro-alert-meta">{{ a.autorNombre }}</span>
            <span class="foro-alert-text">«{{ resumenTexto(a) }}»</span>
          </span>
        </button>
      </div>
    }
  </div>
}
