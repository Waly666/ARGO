@if (visible()) {
  <div class="head-alarm-wrap">
    <button
      type="button"
      class="head-alarm alarm-vehiculo-docs"
      (click)="irVehiculos()"
      [title]="detalle() || 'Hay documentos de vehículos vencidos o por vencer'">
      <span class="head-alarm-pulse" aria-hidden="true"></span>
      <span class="head-alarm-icon" aria-hidden="true">◐</span>
      <span class="head-alarm-body">
        <span class="head-alarm-title"><strong>Papeles vehículos</strong> · {{ titulo() }}</span>
        <span class="head-alarm-detail">{{ detalle() }}</span>
      </span>
    </button>
    <button type="button" class="head-alarm-close" (click)="cerrar($event)" aria-label="Cerrar aviso">×</button>
  </div>
}
